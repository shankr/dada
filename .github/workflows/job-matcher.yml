name: Job Matcher

on:
  workflow_dispatch:
    inputs:
      force_recompute:
        description: Force ATS rescoring for all cached jobs
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: read
  id-token: write

jobs:
  run-job-matcher:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: job-matcher
    env:
      AWS_REGION: us-east-2
      JOB_MATCHER_S3_BUCKET: job-matcher-dada
      JOB_MATCHER_S3_PREFIX: latest
      JOB_MATCHER_FORCE_RECOMPUTE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_recompute || 'false' }}
      JOB_MATCHER_TIMEZONE: America/Los_Angeles

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: job-matcher/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve job artifact paths
        run: node scripts/job-artifact-paths.js >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore resume from S3
        env:
          JOB_MATCHER_RESUME_S3_KEY: ${{ vars.JOB_MATCHER_RESUME_S3_KEY }}
        run: |
          if [ -z "$JOB_MATCHER_RESUME_S3_KEY" ]; then
            echo "Missing repository variable JOB_MATCHER_RESUME_S3_KEY"
            exit 1
          fi
          mkdir -p "$(dirname "$JOB_MATCHER_RESUME_PATH")"
          aws s3 cp "s3://$JOB_MATCHER_S3_BUCKET/$JOB_MATCHER_RESUME_S3_KEY" "$JOB_MATCHER_RESUME_PATH"

      - name: Verify resume exists
        run: |
          if [ ! -f "$JOB_MATCHER_RESUME_PATH" ]; then
            echo "Missing resume file at $JOB_MATCHER_RESUME_PATH"
            echo "Set the repository variable JOB_MATCHER_RESUME_S3_KEY to the S3 object key for the resume PDF."
            exit 1
          fi

      - name: Restore latest ATS cache from S3
        run: |
          mkdir -p "$(dirname "$JOB_MATCHER_CACHE_DB")"
          aws s3 cp "s3://$JOB_MATCHER_S3_BUCKET/$JOB_MATCHER_S3_PREFIX/ats-cache.sqlite" "$JOB_MATCHER_CACHE_DB" || true

      - name: Run job matcher
        env:
          JOB_MATCHER_OUTPUT_PATH: ${{ env.JOB_MATCHER_OUTPUT_TXT }}
        run: npm start

      - name: Upload latest artifacts to S3
        if: ${{ always() }}
        run: |
          if [ -f "$JOB_MATCHER_OUTPUT_TXT" ]; then
            aws s3 cp "$JOB_MATCHER_OUTPUT_TXT" "s3://$JOB_MATCHER_S3_BUCKET/$JOB_MATCHER_S3_PREFIX/job-matches.txt"
            aws s3 cp "$JOB_MATCHER_OUTPUT_TXT" "s3://$JOB_MATCHER_S3_BUCKET/runs/$JOB_MATCHER_RUN_LABEL/job-matches.txt"
          fi

          if [ -f "$JOB_MATCHER_OUTPUT_JSON" ]; then
            aws s3 cp "$JOB_MATCHER_OUTPUT_JSON" "s3://$JOB_MATCHER_S3_BUCKET/$JOB_MATCHER_S3_PREFIX/job-matches.json"
            aws s3 cp "$JOB_MATCHER_OUTPUT_JSON" "s3://$JOB_MATCHER_S3_BUCKET/runs/$JOB_MATCHER_RUN_LABEL/job-matches.json"
          fi

          if [ -f "$JOB_MATCHER_CACHE_DB" ]; then
            aws s3 cp "$JOB_MATCHER_CACHE_DB" "s3://$JOB_MATCHER_S3_BUCKET/$JOB_MATCHER_S3_PREFIX/ats-cache.sqlite"
          fi

      - name: Email job report
        if: ${{ always() && vars.JOB_MATCHER_EMAIL_TO != '' && vars.JOB_MATCHER_EMAIL_FROM != '' }}
        env:
          JOB_MATCHER_EMAIL_TO: ${{ vars.JOB_MATCHER_EMAIL_TO }}
          JOB_MATCHER_EMAIL_FROM: ${{ vars.JOB_MATCHER_EMAIL_FROM }}
          JOB_MATCHER_EMAIL_SUBJECT: Job Matcher Report ${{ env.JOB_MATCHER_RUN_LABEL }}
        run: |
          if [ ! -f "$JOB_MATCHER_OUTPUT_TXT" ]; then
            echo "Skipping email because report file is missing"
            exit 0
          fi
          EMAIL_PAYLOAD_PATH="$RUNNER_TEMP/job-matcher-email.json"
          node scripts/build-report-email.js "$JOB_MATCHER_OUTPUT_TXT" "$EMAIL_PAYLOAD_PATH"
          aws sesv2 send-email --cli-input-json "file://$EMAIL_PAYLOAD_PATH"
