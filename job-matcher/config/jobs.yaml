# Job Scraper Configuration
# Add your resume path and job boards here

# Path to your resume PDF file
resume_path: "./resume.pdf"

# Output file path for results
output_path: "./output/job-matches.txt"

# SQLite cache for ATS scores (keyed by job URL)
ats_cache_db_path: "./output/ats-cache.sqlite"

# Maximum number of jobs to scrape per board (0 = unlimited)
max_jobs_per_board: 50

# Delay between page requests in milliseconds (be respectful to servers)
request_delay_ms: 2000

# LLM Configuration for ATS scoring
llm:
  # Provider options: openrouter, local-hybrid
  provider: "local-hybrid"
  
  # OpenRouter API key (required only when provider = openrouter)
  api_key: "${OPENROUTER_KEY}"
  
  # OpenRouter model (used only when provider = openrouter)
  model: "deepseek/deepseek-v3.2"

# Local hybrid scoring configuration (no LLM calls)
scoring:
  mode: "hybrid_local"
  force_recompute: false
  embedding_model: "BAAI/bge-small-en-v1.5"
  weights:
    lexical: 0.20
    embedding: 0.45
    rules: 0.20
    recency: 0.15
  min_skill_overlap: 2
  required_qualifications_threshold: 0.45
  required_qualifications_penalty_max: 0.30
  required_qualifications_bullet_penalty_threshold: 0.35
  required_qualifications_penalty_per_bullet: 0.06
  recency_half_life_days: 30
  max_resume_chars: 4000
  max_job_chars: 4000

# Job boards to scrape
# Supported types: workday, greenhouse, lever, smartrecruiters, custom, custom-api
job_boards:
# Custom job boards (if not using standard platforms)
  - name: "Disney"
    type: "custom"
    url: "https://www.disneycareers.com/en/search-jobs/Software%20engineer/98034%2C%20Kirkland%2C%20WA/391/1/4/6252001-5815135-5799783-5799841/47x7188/-122x1966/100/2?pc=98034"
    selectors:
      job_list_container: "#search-results-list"
      job_card: "#search-results-list ul li"
      title: "h2"
      location: ".job-location"
      link: "a"
      description: null
      show_all_button: "#search-results-list .pagination-show-all"
      view_more_button: "#search-results-list .pagination-view-more"
      next_button: "#search-results-list .pagination-paging .next"
      job_url_attribute: "href"
      require_link: true
      require_link_attr: "data-job-id"
      url_pattern: "/en/job/"

  - name: "Apple"
    type: "custom"
    url: "https://jobs.apple.com/en-us/search?search=Software+Engineer&sort=relevance&location=seattle-SEA&key=Java"
    selectors:
      job_list_container: "#search-results"
      job_card: "#search-job-list li.rc-accordion-item"
      title: "h3 a"
      location: ".job-title-location span:not(.a11y)"
      link: "h3 a"
      description: null
      next_button: "button[aria-label='Next Page']"
      job_url_attribute: "href"
      require_link: true
      url_pattern: "/en-us/details/"

  - name: "Redfin"
    type: "custom-api"
    url: "https://careers.redfin.com/widgets"
    api:
      http_method: "POST"
      headers:
        Content-Type: "application/json"
        Origin: "https://careers.redfin.com"
        Referer: "https://careers.redfin.com/us/en/c/engineering-product-jobs"
      session_bootstrap:
        enabled: true
        url: "https://careers.redfin.com/us/en/c/engineering-product-jobs"
      payload:
        sortBy: ""
        subsearch: ""
        from: 0
        jobs: true
        counts: true
        all_fields: ["category","country","state","city","type"]
        pageName: "search-results"
        size: 10
        clearAll: false
        jdsource: "facets"
        isSliderEnable: false
        pageId: "page10"
        siteType: "external"
        keywords: ""
        global: true
        selected_fields:
          category: ["Engineering & Product"]
          city: ["Seattle","Remote"]
        lang: "en_us"
        deviceType: "desktop"
        country: "us"
        refNum: "REFREDUS"
        ddoKey: "refineSearch"
      results_path: "refineSearch.data.jobs"
      total_path: "refineSearch.totalHits"
      title_path: "title"
      location_path: "location"
      url_path: "applyUrl"
      description_path: "ml_job_parser.descriptionTeaser_ats"
      posted_date_path: "postedDate"
      pagination:
        offset_field: "from"
        size_field: "size"
        offset_start: 0
        page_size: 10

  - name: "GEICO"
    type: "workday"
    url: "https://geico.wd1.myworkdayjobs.com/en-US/External?q=software%20engineer&locations=1d96ffb7bce60173a914c756f301bdca&jobFamilyGroup=da128ce5a1dc103e7c09aaa3fe312266"
    selectors:
      job_list_container: "[data-automation-id='jobResults']"
      job_card: "section[data-automation-id='jobResults'] ul[role='list'] > li"
      title: "[data-automation-id='jobTitle']"
      location: "[data-automation-id='locations']"
      description: "[data-automation-id='jobPostingDescription']"
      next_button: "button[aria-label='next']"
      job_url_attribute: "data-automation-id"
